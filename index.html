<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff; /* blanco */
    color: #0f172a; /* texto oscuro */
    scroll-behavior: smooth;
}

nav {
    position: fixed;
    width: 100%;
    background: rgba(15,23,42,0.9);
    display: flex;
    justify-content: center;
    padding: 15px;
    z-index: 1000;
}

nav a {
    color: #e2e8f0;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: #38bdf8;
}

section {
    padding: 100px 20px;
    max-width: 900px;
    margin: auto;
}

h1, h2 {
    text-align: center;
}

/* HERO HEADER */
.hero {
    background: #0f172a; /* tu color original */
    color: #e2e8f0;
    padding: 120px 20px 40px 20px;
}

.hero-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.hero img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
}

.hero-text {
    text-align: left;
}

.hero h1 {
    margin: 0;
    font-size: 2.5em;
}

/* CARDS (se quedan igual) */
.card {
    display: flex;
    align-items: center;
    gap: 20px;
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin: 20px 0;
    cursor: pointer;
    transition: transform 0.3s;
    color: #e2e8f0;
}

.card:hover {
    transform: scale(1.02);
}

.card img {
    width: 470px;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
}

.card-text p {
    color: #cbd5f5;
}

/* SKILLS */
.skills span {
    display: inline-block;
    background: #334155;
    margin: 5px;
    padding: 8px 12px;
    border-radius: 8px;
    color: #e2e8f0;
}

footer {
    text-align: center;
    padding: 20px;
    background: #020617;
    color: #e2e8f0;
}
</style>
